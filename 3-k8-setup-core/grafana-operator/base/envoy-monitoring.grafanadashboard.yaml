apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: envoy-proxy-monitoring
  labels:
    app.kubernetes.io/name: grafana-main
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: "Envoy"
  datasources: 
    - datasourceName: Prometheus
      inputName: "DS_AFRANET_PROMETHEUS"
  grafanaCom:
    id: 23239 
