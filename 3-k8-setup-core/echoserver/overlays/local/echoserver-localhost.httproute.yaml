apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echoserver-localhost
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  hostnames:
    - "echoserver.localhost"
  rules:
    - matches:
        - path:
            value: "/"
      backendRefs:
        - name: echoserver
          kind: service
          port: 8080 # Envoy will talk to your app over port 8080 (HTTP)