apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

helmCharts:
- name: gateway-crds-helm
  repo: oci://docker.io/envoyproxy
  version: v1.7.1   # will use "latest" when not specified
  valuesFile: values-crd.yaml
  includeCRDs: true
- name: gateway-helm
  repo: oci://docker.io/envoyproxy
  version: 1.7.2   # will use "latest" when not specified
  namespace: envoy-gateway-system
  valuesFile: values-gateway.yaml
  includeCRDs: false

resources:
- envoy-gateway.namespace.yaml
- envoy-gateway.gatewayclass.yaml