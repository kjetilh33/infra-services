apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: envoy-gateway-system

helmCharts:
- name: gateway-helm-crd
  repo: https://docker.io/envoyproxy
  version: v1.7.1   # will use "latest" when not specified
  values: values-crd.yaml
  includeCRDs: true
- name: gateway-helm
  repo: https://docker.io/envoyproxy
  version: v1.7.1   # will use "latest" when not specified
  namespace: envoy-gateway-system
  values: values-gateway.yaml
  includeCRDs: false

resources:
- envoy-gateway.namespace.yaml